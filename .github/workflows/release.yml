name: Release and Push Docker Image

# 触发条件：创建 Git 标签时
on:
  push:
    tags:
      - 'v*'           # 匹配 v 开头的标签，如 v1.0.0
      - 'release/*'    # 匹配 release/* 标签

# 环境变量
env:
  REGISTRY: registry.cn-hangzhou.aliyuncs.com
  NAMESPACE: sky-devops
  IMAGE_NAME: iptv

jobs:
  # ========================================
  # 任务 1: 创建 GitHub Release
  # ========================================
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get release notes
        id: release_notes
        run: |
          # 获取上一个标签
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            # 如果没有前一个标签，获取所有提交
            CHANGELOG=$(git log --pretty=format:'- %s (%h)' HEAD)
          else
            # 获取两个标签之间的提交
            CHANGELOG=$(git log --pretty=format:'- %s (%h)' ${PREV_TAG}..HEAD)
          fi
          echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          name: Release ${{ github.ref_name }}
          body: |
            ## 📝 更新日志
            
            ${{ steps.release_notes.outputs.CHANGELOG }}
            
            ## 🐳 Docker 镜像
            
            - \`latest\`: \`${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE_NAME }}:latest\`
            - \`${{ github.ref_name }}\`: \`${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}\`
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ github.token }}

  # ========================================
  # 任务 2: 构建并推送多架构镜像
  # ========================================
  build-and-push:
    name: Build and Push Multi-arch Image
    runs-on: ubuntu-latest
    needs: create-release
    
    steps:
      # 步骤 1: 检出代码
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 步骤 2: 设置 QEMU
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # 步骤 3: 设置 Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest
            platform=linux/amd64,linux/arm64

      # 步骤 4: 登录阿里云
      - name: Login to Aliyun Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ALIYUN_USERNAME }}
          password: ${{ secrets.ALIYUN_PASSWORD }}

      # 步骤 5: 提取元数据
      - name: Extract metadata
        id: meta
        run: |
          # 从标签提取版本号（去掉 v 前缀）
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> $GITHUB_OUTPUT

      # 步骤 6: 构建并推送
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          pull: true
          build-args: |
            VERSION=${{ github.ref_name }}
            BUILD_TIME=${{ steps.meta.outputs.BUILD_TIME }}
            GIT_COMMIT=${{ github.sha }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.VERSION }}
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE_NAME }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.event.repository.html_url }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ github.ref_name }}
            org.opencontainers.image.created=${{ steps.meta.outputs.BUILD_TIME }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 步骤 7: 更新 Release 描述
      - name: Update Release with image info
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          append_body: true
          body: |
            
            ---
            ## ✅ 构建状态
            - 状态：成功
            - 时间：${{ steps.meta.outputs.BUILD_TIME }}
            - 架构：amd64, arm64
